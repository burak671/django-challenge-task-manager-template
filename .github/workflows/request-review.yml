name: Request Review

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review]

permissions:
  pull-requests: write

jobs:
  request-review:
    if: github.event.pull_request.user.login != 'krr0ption'
    runs-on: ubuntu-latest

    steps:
      - name: Request review from krr0ption
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                reviewers: ['krr0ption']
              })
            } catch (error) {
              core.warning(`Could not request review: ${error.message}`)
            }
